name: Go test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: vet / build / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # go.mod requires go >= 1.25.0 (after `go mod tidy`); each matrix
        # entry installs a Go version that satisfies that minimum
        # directly. setup-go@v6 defaults GOTOOLCHAIN=local, so we must
        # not ask it to test with a version below go.mod's minimum.
        go-version: ["1.25", "1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 -timeout 120s ./...

      - name: Coverage report
        run: |
          go test -count=1 -coverprofile=coverage.out -timeout 120s ./...
          go tool cover -func=coverage.out | tail -20
        if: matrix.go-version == '1.26'

  # OSINT backends are network-dependent. We don't fail CI on transient
  # outages, but we want a record of which ones regressed. The
  # scripts/osint-status.sh probe covers all 16 backends in parallel
  # (~10s) and surfaces results in $GITHUB_STEP_SUMMARY so reviewers
  # can see them without leaving the PR. The committed
  # BACKEND_STATUS.md is refreshed weekly by the dedicated
  # osint-status workflow; this on-PR run is the in-loop signal.
  osint-smoke:
    name: OSINT backend smoke (live, best-effort)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Make script executable
        run: chmod +x ./scripts/osint-status.sh
      - name: Probe all backends
        id: probe
        # set +e lets us capture the report even when probes fail.
        run: |
          set +e
          ./scripts/osint-status.sh --out /tmp/status.md
          echo "exit=$?"
          exit 0
        shell: bash
      - name: Surface status in PR
        if: always()
        run: |
          {
            echo "## OSINT backend smoke"
            echo ""
            cat /tmp/status.md
          } >> "$GITHUB_STEP_SUMMARY"