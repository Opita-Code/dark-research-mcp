name: Go test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: vet / build / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 -timeout 120s ./...

      - name: Coverage report
        run: |
          go test -count=1 -coverprofile=coverage.out -timeout 120s ./...
          go tool cover -func=coverage.out | tail -20
        if: matrix.go-version == '1.23'

  # OSINT backends are network-dependent. We don't fail CI on transient
  # outages, but we want a record of which ones regressed.
  osint-smoke:
    name: OSINT backend smoke (live, best-effort)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build binary
        run: go build -o ./bin/dark-research-mcp ./cmd/dark-research-mcp
      - name: Smoke (duckduckgo web)
        run: |
          cat <<'EOF' > /tmp/init.json
          {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}
          {"jsonrpc":"2.0","method":"notifications/initialized"}
          {"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"dark_research_web","arguments":{"query":"go modules","limit":3}}}
          EOF
          cat /tmp/init.json | ./bin/dark-research-mcp 2>/dev/null | head -c 800 || true